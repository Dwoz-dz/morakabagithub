workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60

    environment:
      vars:
        NODE_ENV: production

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
